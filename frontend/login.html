<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Booking - Login</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo">
                <span class="logo-text-small">MYSTERY</span>
                <span class="logo-text-tiny">Booking</span>
            </div>
            <h2 class="site-title">MYSTERY BOOKING</h2>
        </div>
        <nav>
            <a href="login.html" class="nav-btn active">LOG IN</a>
            <a href="#" class="nav-btn" id="nav-offers">OFFERS</a>
            <a href="index.html" class="nav-btn">HOME</a>
        </nav>
    </header>

    <main class="login-page">
        <div class="login-container">
            <div class="login-box">
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to continue your mystery journey</p>
                
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" id="togglePassword">👁️</button>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn">SIGN IN</button>
                </form>

                <div class="register-section">
                    <p>Don't have an account? <a href="#" id="showRegister">Create one now</a></p>
                </div>

                <div class="social-login">
                    <p>Or continue with</p>
                    <div class="social-icons">
                        <button class="social-btn google">G</button>
                        <button class="social-btn facebook">f</button>
                        <button class="social-btn apple">🍎</button>
                    </div>
                </div>
            </div>

            <!-- Mystery Decoration -->
            <div class="mystery-decoration">
                <div class="decoration-item">✨</div>
                <div class="decoration-item">🔮</div>
                <div class="decoration-item">🗺️</div>
                <div class="decoration-item">🎭</div>
            </div>
        </div>
    </main>

    <!-- Registration Modal (Hidden by default) -->
    <div id="register-modal" class="modal hidden">
        <div class="modal-content register-modal">
            <span class="close-btn">&times;</span>
            <h2 class="form-title">Create Account</h2>
            
            <form id="register-form" class="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="reg-confirm-password">Confirm Password</label>
                    <input type="password" id="reg-confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                </div>

                <div class="form-group">
                    <label>Preferred Experience Type</label>
                    <div class="radio-group">
                        <label><input type="radio" name="pref-type" value="adventure"> Adventure</label>
                        <label><input type="radio" name="pref-type" value="relaxation"> Relaxation</label>
                        <label><input type="radio" name="pref-type" value="cultural"> Cultural</label>
                        <label><input type="radio" name="pref-type" value="nightlife"> Nightlife</label>
                    </div>
                </div>

                <div class="terms-agreement">
                    <label>
                        <input type="checkbox" required> I agree to the <a href="#">Terms and Conditions</a>
                    </label>
                </div>

                <button type="submit" class="submit-btn">CREATE ACCOUNT</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
